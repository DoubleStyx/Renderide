# Builds the Rust workspace and runs unit / integration tests on all major desktop OSes.
# .NET (`generators/`) is covered by `dotnet-ci.yml`.
name: Rust CI

"on":
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux is the only runner where GStreamer dev packages are reliably installable
          # via the system package manager, so it's the only OS that exercises the
          # `video-textures` feature (which pulls in gstreamer-sys / glib-sys).
          # `--all-features` here also enables `tracy`, giving us lint coverage of that path.
          - os: ubuntu-latest
            clippy_features: "--all-features"
          - os: windows-latest
            clippy_features: "--features tracy"
          - os: macos-latest
            clippy_features: "--features tracy"

    steps:
      - uses: actions/checkout@v4

      # `materials::registry` wgpu smoke test requires an adapter when `CI` is set (GitHub sets it by default).
      # GStreamer dev packages are required only when the `video-textures` feature is enabled
      # (Linux clippy does this via `--all-features`); pkg-config resolves the headers/libs at build time.
      - name: Install Linux system dependencies (Vulkan + GStreamer)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers vulkan-tools \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - uses: uncenter/setup-taplo@v2
        with:
          version: "0.10.0"

      - name: Check TOML formatting (taplo)
        run: taplo fmt --check --diff

      - name: Clippy
        run: cargo clippy --all-targets ${{ matrix.clippy_features }} -- -W clippy::all -D warnings

      - name: cargo build
        run: cargo build --workspace --locked

      - name: cargo test
        run: cargo test --workspace --locked

  headless-renderer:
    name: headless renderer suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Vulkan + GStreamer)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers vulkan-tools \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build headless suite binaries
        run: cargo build --profile dev-fast --locked -p renderide -p renderide-test

      - name: Run headless renderer suite
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          MESA_LOADER_DRIVER_OVERRIDE: "llvmpipe"
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
          WGPU_BACKEND: vulkan
        run: cargo run --profile dev-fast --locked -p renderide-test -- check-suite --dev-fast

      - name: Upload headless suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-renderer-suite
          path: |
            target/renderide-test-out/**
            logs/renderer-test/**
            logs/renderer/**
